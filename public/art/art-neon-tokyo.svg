<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 800" width="800" height="800">
 <defs>
  <linearGradient id="sky" x1="0" y1="0" x2="0" y2="1">
   <stop offset="0" stop-color="#0a0723"/><stop offset="0.5" stop-color="#2a1454"/><stop offset="0.72" stop-color="#742a67"/><stop offset="0.85" stop-color="#ff4d9d"/><stop offset="1" stop-color="#1a0f33"/>
  </linearGradient>
  <linearGradient id="water" x1="0" y1="0" x2="0" y2="1">
   <stop offset="0" stop-color="#2b1450"/><stop offset="1" stop-color="#0a0719"/>
  </linearGradient>
  <radialGradient id="moon" cx="0.5" cy="0.5" r="0.5">
   <stop offset="0" stop-color="#ffe9f4"/><stop offset="0.7" stop-color="#ffb8d9"/><stop offset="1" stop-color="#ffb8d9" stop-opacity="0"/>
  </radialGradient>
  <radialGradient id="vig3" cx="0.5" cy="0.5" r="0.72">
   <stop offset="0.55" stop-color="#000" stop-opacity="0"/><stop offset="1" stop-color="#000" stop-opacity="0.5"/>
  </radialGradient>
  <pattern id="w1" width="20" height="26" patternUnits="userSpaceOnUse">
   <rect x="5" y="6" width="6" height="9" rx="1" fill="#ffd28a" opacity="0.75"/>
  </pattern>
  <pattern id="w2" width="24" height="30" patternUnits="userSpaceOnUse">
   <rect x="11" y="12" width="5" height="8" rx="1" fill="#8ad7ff" opacity="0.6"/>
  </pattern>
  <filter id="g1"><feGaussianBlur stdDeviation="14"/></filter>
  <filter id="g2"><feGaussianBlur stdDeviation="5"/></filter>
 </defs>

 <rect width="800" height="800" fill="url(#sky)"/>
 <circle cx="560" cy="240" r="120" fill="url(#moon)" opacity="0.9"/>
 <circle cx="560" cy="240" r="74" fill="#ffe1ee"/>
 <path d="M 500,225 A 74,74 0 0 0 560,314 A 60,60 0 0 1 500,225 Z" fill="#f3b9d3" opacity="0.6"/>

 <!-- skyline -->
 <g fill="#120b2e">
  <rect x="-10" y="380" width="130" height="240"/>
  <rect x="110" y="330" width="90" height="290"/>
  <polygon points="200,620 200,300 245,270 290,300 290,620"/>
  <rect x="290" y="360" width="80" height="260"/>
  <rect x="380" y="410" width="70" height="210"/>
  <rect x="450" y="340" width="100" height="280"/>
  <rect x="560" y="390" width="80" height="230"/>
  <rect x="640" y="320" width="90" height="300"/>
  <rect x="730" y="400" width="80" height="220"/>
  <rect x="238" y="180" width="14" height="100"/>
  <circle cx="245" cy="172" r="7" fill="#ff4d9d"/>
 </g>
 <g>
  <rect x="110" y="330" width="90" height="290" fill="url(#w1)"/>
  <rect x="450" y="340" width="100" height="280" fill="url(#w2)"/>
  <rect x="640" y="320" width="90" height="300" fill="url(#w1)" opacity="0.7"/>
  <rect x="-10" y="380" width="130" height="240" fill="url(#w2)" opacity="0.6"/>
 </g>
 <!-- neon signs -->
 <rect x="300" y="400" width="56" height="120" rx="8" fill="#ff4d9d" opacity="0.9" filter="url(#g2)"/>
 <rect x="662" y="360" width="44" height="90" rx="8" fill="#22d3ee" opacity="0.85" filter="url(#g2)"/>
 <rect x="130" y="380" width="48" height="26" rx="6" fill="#ffb454" opacity="0.8" filter="url(#g2)"/>

 <!-- water -->
 <rect y="620" width="800" height="180" fill="url(#water)"/>
 <g opacity="0.55">
  <rect x="306" y="628" width="44" height="150" fill="#ff4d9d" opacity="0.4" filter="url(#g1)"/>
  <rect x="668" y="628" width="34" height="120" fill="#22d3ee" opacity="0.35" filter="url(#g1)"/>
  <rect x="530" y="628" width="60" height="160" fill="#ffb8d9" opacity="0.3" filter="url(#g1)"/>
 </g>
 <g stroke="#ffd7ea" opacity="0.25" stroke-width="2">
  <line x1="500" y1="660" x2="620" y2="660"/><line x1="540" y1="700" x2="600" y2="700"/>
  <line x1="320" y1="680" x2="380" y2="680"/><line x1="660" y1="730" x2="710" y2="730"/>
 </g>

 <rect width="800" height="800" fill="url(#vig3)"/>
</svg>
