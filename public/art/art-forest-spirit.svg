<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 800" width="800" height="800">
 <defs>
  <linearGradient id="fbg" x1="0" y1="0" x2="0" y2="1">
   <stop offset="0" stop-color="#04150f"/><stop offset="0.6" stop-color="#0a2b1e"/><stop offset="1" stop-color="#03100a"/>
  </linearGradient>
  <radialGradient id="fglow" cx="0.5" cy="0.55" r="0.45">
   <stop offset="0" stop-color="#7dffc9" stop-opacity="0.5"/><stop offset="1" stop-color="#7dffc9" stop-opacity="0"/>
  </radialGradient>
  <linearGradient id="ray" x1="0" y1="0" x2="0" y2="1">
   <stop offset="0" stop-color="#bdf5da" stop-opacity="0.28"/><stop offset="1" stop-color="#bdf5da" stop-opacity="0"/>
  </linearGradient>
  <radialGradient id="fvig" cx="0.5" cy="0.5" r="0.72">
   <stop offset="0.5" stop-color="#000" stop-opacity="0"/><stop offset="1" stop-color="#000" stop-opacity="0.6"/>
  </radialGradient>
  <filter id="fb"><feGaussianBlur stdDeviation="8"/></filter>
 </defs>

 <rect width="800" height="800" fill="url(#fbg)"/>

 <!-- god rays -->
 <polygon points="240,-20 180,520 330,520" fill="url(#ray)" transform="rotate(8 250 250)"/>
 <polygon points="560,-40 500,480 660,480" fill="url(#ray)" transform="rotate(-6 560 220)"/>

 <!-- distant trunks -->
 <g fill="#062017">
  <rect x="60" y="0" width="46" height="800" rx="10"/>
  <rect x="180" y="0" width="30" height="800" rx="8" opacity="0.8"/>
  <rect x="640" y="0" width="52" height="800" rx="10"/>
  <rect x="740" y="0" width="34" height="800" rx="8" opacity="0.8"/>
  <rect x="330" y="0" width="24" height="800" rx="6" opacity="0.55"/>
 </g>

 <!-- ground -->
 <ellipse cx="400" cy="760" rx="520" ry="120" fill="#041a10"/>
 <ellipse cx="420" cy="640" rx="260" ry="46" fill="url(#fglow)"/>

 <!-- glowing deer -->
 <g transform="translate(400 470)">
  <ellipse cx="0" cy="160" rx="120" ry="18" fill="#7dffc9" opacity="0.12" filter="url(#fb)"/>
  <g fill="#0b3d2a" stroke="#8fffd2" stroke-width="3">
   <!-- body -->
   <path d="M -95,55 C -100,20 -70,0 -30,-2 C 10,-4 40,-6 60,-20 C 66,-38 60,-60 72,-78 L 84,-72 C 80,-56 88,-44 84,-28 C 96,-30 104,-24 106,-12 L 92,-6 C 84,-2 78,6 76,18 C 72,60 80,90 84,120 L 66,126 C 58,98 54,80 48,66 C 20,74 -30,74 -58,64 C -66,84 -70,102 -74,124 L -92,120 C -90,92 -94,72 -95,55 Z"/>
  </g>
  <!-- antlers -->
  <g stroke="#a5ffe0" stroke-width="4" fill="none" stroke-linecap="round">
   <path d="M 72,-80 C 64,-104 66,-124 82,-142"/>
   <path d="M 70,-100 C 56,-108 48,-120 46,-134"/>
   <path d="M 74,-116 C 88,-122 94,-132 96,-146"/>
   <path d="M 78,-84 C 92,-96 98,-104 112,-108"/>
  </g>
  <circle cx="86" cy="-70" r="2.5" fill="#eafff6"/>
 </g>

 <!-- fireflies -->
 <g fill="#b8ffe2">
  <circle cx="210" cy="380" r="3.5" opacity="0.9"/><circle cx="260" cy="480" r="2" opacity="0.6"/>
  <circle cx="560" cy="340" r="3" opacity="0.8"/><circle cx="610" cy="440" r="2" opacity="0.55"/>
  <circle cx="470" cy="260" r="2.5" opacity="0.7"/><circle cx="350" cy="330" r="2" opacity="0.5"/>
  <circle cx="150" cy="560" r="2.5" opacity="0.65"/><circle cx="690" cy="560" r="3" opacity="0.7"/>
 </g>

 <rect width="800" height="800" fill="url(#fvig)"/>
</svg>
