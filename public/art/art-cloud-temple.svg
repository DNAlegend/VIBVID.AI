<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 800" width="800" height="800">
 <defs>
  <linearGradient id="tsky" x1="0" y1="0" x2="0" y2="1">
   <stop offset="0" stop-color="#1b1240"/><stop offset="0.5" stop-color="#5a2a68"/><stop offset="0.8" stop-color="#e8683f"/><stop offset="1" stop-color="#ffb454"/>
  </linearGradient>
  <radialGradient id="tsun" cx="0.5" cy="0.5" r="0.5">
   <stop offset="0" stop-color="#fff3d6"/><stop offset="0.6" stop-color="#ffc46b" stop-opacity="0.85"/><stop offset="1" stop-color="#ffc46b" stop-opacity="0"/>
  </radialGradient>
  <radialGradient id="tvig" cx="0.5" cy="0.45" r="0.75">
   <stop offset="0.5" stop-color="#000" stop-opacity="0"/><stop offset="1" stop-color="#12081e" stop-opacity="0.5"/>
  </radialGradient>
  <filter id="tb"><feGaussianBlur stdDeviation="14"/></filter>
 </defs>

 <rect width="800" height="800" fill="url(#tsky)"/>
 <circle cx="400" cy="560" r="230" fill="url(#tsun)"/>
 <circle cx="400" cy="560" r="95" fill="#ffe9bd"/>

 <!-- distant birds -->
 <g stroke="#2a1030" stroke-width="3" fill="none" stroke-linecap="round">
  <path d="M 210,220 q 11,-11 22,0 q 11,-11 22,0"/>
  <path d="M 560,170 q 9,-9 18,0 q 9,-9 18,0"/>
 </g>

 <!-- cloud sea -->
 <g fill="#f6e3ef">
  <ellipse cx="120" cy="640" rx="220" ry="60" opacity="0.95"/>
  <ellipse cx="420" cy="680" rx="280" ry="70"/>
  <ellipse cx="700" cy="650" rx="220" ry="60" opacity="0.95"/>
  <ellipse cx="260" cy="600" rx="160" ry="40" opacity="0.8"/>
  <ellipse cx="580" cy="610" rx="170" ry="42" opacity="0.85"/>
 </g>
 <g fill="#e9c8de" opacity="0.7">
  <ellipse cx="180" cy="660" rx="150" ry="34"/>
  <ellipse cx="520" cy="700" rx="200" ry="40"/>
 </g>

 <!-- floating island + temple -->
 <g transform="translate(400 430)">
  <!-- island -->
  <path d="M -150,60 C -100,84 100,84 150,60 C 100,116 -100,116 -150,60 Z" fill="#3a1b40"/>
  <ellipse cx="0" cy="60" rx="150" ry="26" fill="#542a52"/>
  <!-- torii gate -->
  <g fill="#c2333f">
   <rect x="-96" y="-116" width="16" height="150" rx="4"/>
   <rect x="80" y="-116" width="16" height="150" rx="4"/>
   <path d="M -130,-130 C -60,-146 60,-146 130,-130 L 126,-108 C 60,-122 -60,-122 -126,-108 Z"/>
   <rect x="-104" y="-96" width="208" height="14" rx="5"/>
  </g>
  <path d="M -130,-130 C -60,-146 60,-146 130,-130 L 128,-119 C 60,-134 -60,-134 -128,-119 Z" fill="#e8505b"/>
  <!-- small shrine behind -->
  <g>
   <rect x="-38" y="-28" width="76" height="60" rx="4" fill="#4a1f3d"/>
   <path d="M -58,-28 C -20,-44 20,-44 58,-28 L 46,-46 C 16,-58 -16,-58 -46,-46 Z" fill="#c2333f"/>
   <rect x="-10" y="4" width="20" height="28" rx="3" fill="#ffd28a"/>
  </g>
  <!-- lanterns -->
  <circle cx="-88" cy="-40" r="7" fill="#ffd28a"/>
  <circle cx="88" cy="-40" r="7" fill="#ffd28a"/>
 </g>

 <!-- drifting cloud wisp over island -->
 <ellipse cx="250" cy="420" rx="120" ry="22" fill="#f6e3ef" opacity="0.5" filter="url(#tb)"/>

 <rect width="800" height="800" fill="url(#tvig)"/>
</svg>
