<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 800" width="800" height="800">
 <defs>
  <linearGradient id="mbg" x1="0" y1="0" x2="0" y2="1">
   <stop offset="0" stop-color="#0b0714"/><stop offset="0.6" stop-color="#241130"/><stop offset="1" stop-color="#4a1a33"/>
  </linearGradient>
  <linearGradient id="mground" x1="0" y1="0" x2="0" y2="1">
   <stop offset="0" stop-color="#6b2438"/><stop offset="1" stop-color="#2c0e1e"/>
  </linearGradient>
  <radialGradient id="mdomeg" cx="0.5" cy="0.45" r="0.55">
   <stop offset="0" stop-color="#ffb454" stop-opacity="0.55"/><stop offset="1" stop-color="#ffb454" stop-opacity="0"/>
  </radialGradient>
  <radialGradient id="mvig" cx="0.5" cy="0.45" r="0.75">
   <stop offset="0.5" stop-color="#000" stop-opacity="0"/><stop offset="1" stop-color="#000" stop-opacity="0.58"/>
  </radialGradient>
  <filter id="mb"><feGaussianBlur stdDeviation="4"/></filter>
 </defs>

 <rect width="800" height="800" fill="url(#mbg)"/>

 <!-- stars -->
 <g fill="#ffe9f4">
  <circle cx="90" cy="90" r="2"/><circle cx="220" cy="60" r="1.5"/><circle cx="360" cy="110" r="2"/>
  <circle cx="520" cy="70" r="1.6"/><circle cx="660" cy="120" r="2.2"/><circle cx="740" cy="60" r="1.5"/>
  <circle cx="150" cy="200" r="1.6"/><circle cx="600" cy="210" r="1.8"/><circle cx="700" cy="300" r="1.5"/>
  <circle cx="60" cy="330" r="1.8"/><circle cx="300" cy="240" r="1.4"/>
 </g>
 <!-- planet -->
 <circle cx="620" cy="180" r="70" fill="#e07a5f" opacity="0.9"/>
 <ellipse cx="620" cy="180" rx="104" ry="18" fill="none" stroke="#ffcf9a" stroke-width="4" opacity="0.6" transform="rotate(-18 620 180)"/>

 <!-- terrain -->
 <path d="M 0,560 C 160,520 300,570 460,540 C 620,510 720,560 800,540 L 800,800 0,800 Z" fill="url(#mground)"/>
 <ellipse cx="240" cy="640" rx="60" ry="14" fill="#1d0916" opacity="0.8"/>
 <ellipse cx="600" cy="700" rx="80" ry="18" fill="#1d0916" opacity="0.7"/>

 <!-- colony dome -->
 <g>
  <ellipse cx="270" cy="560" rx="150" ry="110" fill="url(#mdomeg)"/>
  <path d="M 130,560 A 140,110 0 0 1 410,560 Z" fill="#331526" opacity="0.7"/>
  <path d="M 130,560 A 140,110 0 0 1 410,560" fill="none" stroke="#ffcf9a" stroke-width="3" opacity="0.8"/>
  <g stroke="#ffcf9a" stroke-width="1.5" opacity="0.4" fill="none">
   <line x1="270" y1="450" x2="270" y2="560"/>
   <path d="M 165,490 C 230,530 310,530 375,490"/>
   <line x1="200" y1="466" x2="220" y2="560"/><line x1="340" y1="466" x2="320" y2="560"/>
  </g>
  <g fill="#ffd28a">
   <rect x="230" y="510" width="10" height="12" rx="2" opacity="0.9"/>
   <rect x="260" y="490" width="12" height="14" rx="2" opacity="0.95"/>
   <rect x="300" y="515" width="9" height="11" rx="2" opacity="0.8"/>
  </g>
 </g>

 <!-- floating astronaut -->
 <g transform="translate(520 340) rotate(12)">
  <!-- tether -->
  <path d="M -30,40 C -90,80 -150,90 -230,130" stroke="#c9b8d8" stroke-width="2.5" fill="none" opacity="0.6" stroke-dasharray="6 8"/>
  <!-- body -->
  <g fill="#efe6f4">
   <rect x="-26" y="-20" width="52" height="66" rx="20"/>
   <path d="M -24,-4 L -58,26 -48,38 -18,16 Z"/>
   <path d="M 24,-4 L 58,22 50,36 18,14 Z"/>
   <path d="M -16,44 L -34,96 -22,102 -2,52 Z"/>
   <path d="M 16,44 L 30,98 42,92 20,48 Z"/>
  </g>
  <rect x="-20" y="-14" width="40" height="30" rx="8" fill="#d7c9e4"/>
  <!-- helmet -->
  <circle cx="0" cy="-38" r="26" fill="#efe6f4"/>
  <circle cx="2" cy="-38" r="19" fill="#1c1030"/>
  <path d="M -8,-46 A 12,12 0 0 1 8,-48" stroke="#ffb8d9" stroke-width="3" fill="none" opacity="0.9"/>
  <!-- backpack edge -->
  <rect x="-32" y="-16" width="8" height="52" rx="4" fill="#d7c9e4"/>
  <circle cx="30" cy="30" r="4" fill="#ffb454"/>
 </g>

 <rect width="800" height="800" fill="url(#mvig)"/>
</svg>
