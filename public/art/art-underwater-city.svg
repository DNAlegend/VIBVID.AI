<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 800" width="800" height="800">
 <defs>
  <linearGradient id="ubg" x1="0" y1="0" x2="0" y2="1">
   <stop offset="0" stop-color="#0a4a63"/><stop offset="0.45" stop-color="#083250"/><stop offset="1" stop-color="#041526"/>
  </linearGradient>
  <linearGradient id="uray" x1="0" y1="0" x2="0" y2="1">
   <stop offset="0" stop-color="#bdf0ff" stop-opacity="0.32"/><stop offset="1" stop-color="#bdf0ff" stop-opacity="0"/>
  </linearGradient>
  <radialGradient id="udome" cx="0.5" cy="0.4" r="0.6">
   <stop offset="0" stop-color="#9fe8ff" stop-opacity="0.5"/><stop offset="0.8" stop-color="#26b995" stop-opacity="0.12"/><stop offset="1" stop-color="#26b995" stop-opacity="0"/>
  </radialGradient>
  <radialGradient id="uvig" cx="0.5" cy="0.45" r="0.75">
   <stop offset="0.5" stop-color="#000" stop-opacity="0"/><stop offset="1" stop-color="#001018" stop-opacity="0.55"/>
  </radialGradient>
  <filter id="ub"><feGaussianBlur stdDeviation="5"/></filter>
 </defs>

 <rect width="800" height="800" fill="url(#ubg)"/>

 <!-- light rays -->
 <polygon points="180,-20 60,540 300,540" fill="url(#uray)" transform="rotate(10 180 200)"/>
 <polygon points="430,-40 320,560 560,560" fill="url(#uray)"/>
 <polygon points="660,-20 560,500 760,500" fill="url(#uray)" transform="rotate(-8 660 200)"/>

 <!-- seabed -->
 <path d="M 0,650 C 140,610 260,660 400,640 C 540,620 660,660 800,630 L 800,800 0,800 Z" fill="#031320"/>

 <!-- city domes & towers -->
 <g>
  <ellipse cx="400" cy="600" rx="190" ry="150" fill="#0d5a7a" opacity="0.5"/>
  <ellipse cx="400" cy="600" rx="190" ry="150" fill="none" stroke="#9fe8ff" stroke-width="3" opacity="0.7"/>
  <g stroke="#9fe8ff" stroke-width="1.5" opacity="0.35" fill="none">
   <path d="M 210,600 A 190,150 0 0 1 590,600"/>
   <line x1="400" y1="450" x2="400" y2="600"/>
   <line x1="305" y1="470" x2="330" y2="600"/>
   <line x1="495" y1="470" x2="470" y2="600"/>
  </g>
  <!-- towers inside -->
  <g fill="#0a2e44">
   <rect x="330" y="500" width="34" height="150" rx="6"/>
   <rect x="386" y="460" width="42" height="190" rx="8"/>
   <rect x="450" y="520" width="30" height="130" rx="6"/>
   <rect x="290" y="550" width="26" height="100" rx="6"/>
  </g>
  <g fill="#ffd28a">
   <rect x="338" y="520" width="6" height="8" rx="1" opacity="0.9"/><rect x="350" y="545" width="6" height="8" rx="1" opacity="0.7"/>
   <rect x="396" y="480" width="7" height="9" rx="1" opacity="0.9"/><rect x="410" y="510" width="7" height="9" rx="1" opacity="0.8"/>
   <rect x="396" y="560" width="7" height="9" rx="1" opacity="0.6"/><rect x="458" y="540" width="6" height="8" rx="1" opacity="0.8"/>
   <rect x="296" y="565" width="5" height="7" rx="1" opacity="0.7"/>
  </g>
  <circle cx="400" cy="440" r="7" fill="#7de3ff" filter="url(#ub)"/>
 </g>

 <!-- small side dome -->
 <ellipse cx="640" cy="640" rx="80" ry="60" fill="#0d5a7a" opacity="0.4"/>
 <ellipse cx="640" cy="640" rx="80" ry="60" fill="none" stroke="#9fe8ff" stroke-width="2" opacity="0.5"/>
 <rect x="620" y="600" width="18" height="50" rx="4" fill="#0a2e44"/>
 <rect x="648" y="615" width="14" height="35" rx="4" fill="#0a2e44"/>

 <!-- tube bridge -->
 <path d="M 585,610 C 600,590 615,590 628,606" stroke="#9fe8ff" stroke-width="10" fill="none" opacity="0.35" stroke-linecap="round"/>

 <!-- fish -->
 <g fill="#bdf0ff" opacity="0.8">
  <path d="M 180,300 l 16,6 -16,6 5,-6 Z"/><path d="M 210,320 l 14,5 -14,5 4,-5 Z"/>
  <path d="M 240,295 l 14,5 -14,5 4,-5 Z"/><path d="M 620,260 l -16,6 16,6 -5,-6 Z"/>
  <path d="M 590,285 l -14,5 14,5 -4,-5 Z"/>
 </g>

 <!-- bubbles -->
 <g fill="none" stroke="#cdf2ff" opacity="0.5">
  <circle cx="150" cy="500" r="6"/><circle cx="166" cy="460" r="4"/><circle cx="158" cy="420" r="3"/>
  <circle cx="700" cy="420" r="5"/><circle cx="712" cy="380" r="3.5"/>
  <circle cx="420" cy="340" r="4"/><circle cx="432" cy="300" r="3"/>
 </g>

 <rect width="800" height="800" fill="url(#uvig)"/>
</svg>
