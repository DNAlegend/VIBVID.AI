<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 800" width="800" height="800">
 <defs>
  <linearGradient id="dbg" x1="0" y1="0" x2="0" y2="1">
   <stop offset="0" stop-color="#0b0714"/><stop offset="1" stop-color="#1c1030"/>
  </linearGradient>
  <linearGradient id="door" x1="0" y1="0" x2="0" y2="1">
   <stop offset="0" stop-color="#ffe9c4"/><stop offset="1" stop-color="#ffb86b"/>
  </linearGradient>
  <linearGradient id="spill" x1="0" y1="0" x2="0" y2="1">
   <stop offset="0" stop-color="#ffcf8e" stop-opacity="0.5"/><stop offset="1" stop-color="#ffcf8e" stop-opacity="0"/>
  </linearGradient>
  <radialGradient id="dvig" cx="0.5" cy="0.45" r="0.75">
   <stop offset="0.45" stop-color="#000" stop-opacity="0"/><stop offset="1" stop-color="#000" stop-opacity="0.62"/>
  </radialGradient>
  <filter id="db"><feGaussianBlur stdDeviation="6"/></filter>
  <filter id="db2"><feGaussianBlur stdDeviation="16"/></filter>
 </defs>

 <rect width="800" height="800" fill="url(#dbg)"/>

 <!-- brick wall hint -->
 <g stroke="#241638" stroke-width="2" opacity="0.6">
  <line x1="0" y1="180" x2="800" y2="180"/><line x1="0" y1="260" x2="800" y2="260"/>
  <line x1="0" y1="340" x2="800" y2="340"/><line x1="0" y1="420" x2="800" y2="420"/>
  <line x1="120" y1="180" x2="120" y2="260"/><line x1="320" y1="260" x2="320" y2="340"/>
  <line x1="540" y1="180" x2="540" y2="260"/><line x1="680" y1="340" x2="680" y2="420"/>
 </g>

 <!-- neon sign -->
 <rect x="80" y="120" width="180" height="54" rx="10" fill="none" stroke="#ff2f8e" stroke-width="4" filter="url(#db)"/>
 <rect x="80" y="120" width="180" height="54" rx="10" fill="#ff2f8e" opacity="0.16" filter="url(#db2)"/>
 <line x1="106" y1="147" x2="234" y2="147" stroke="#ff9ac9" stroke-width="5" stroke-linecap="round" stroke-dasharray="24 14" filter="url(#db)"/>

 <!-- lit doorway -->
 <rect x="472" y="240" width="150" height="360" rx="6" fill="url(#door)"/>
 <rect x="452" y="228" width="190" height="384" rx="10" fill="none" stroke="#3a2a55" stroke-width="10"/>
 <polygon points="472,600 622,600 700,780 380,780" fill="url(#spill)"/>

 <!-- detective silhouette in doorway -->
 <g transform="translate(547 380)" fill="#120a20">
  <ellipse cx="0" cy="-92" rx="34" ry="10"/>
  <rect x="-13" y="-100" width="26" height="14" rx="6"/>
  <circle cx="0" cy="-80" r="12"/>
  <path d="M -30,-64 C -34,-30 -34,20 -28,60 L -34,180 -22,180 -8,70 -6,180 8,180 6,58 C 26,60 30,40 28,10 C 27,-20 24,-48 16,-66 C 6,-72 -20,-72 -30,-64 Z"/>
  <path d="M -30,-60 L -46,20 -38,24 -24,-30 Z"/>
 </g>

 <!-- fog -->
 <ellipse cx="400" cy="680" rx="380" ry="70" fill="#8a6bb8" opacity="0.14" filter="url(#db2)"/>
 <ellipse cx="250" cy="620" rx="240" ry="50" fill="#8a6bb8" opacity="0.10" filter="url(#db2)"/>

 <!-- rain -->
 <g stroke="#cfe0ff" stroke-width="1.3" opacity="0.12">
  <line x1="120" y1="60" x2="100" y2="180"/><line x1="300" y1="30" x2="280" y2="150"/>
  <line x1="600" y1="40" x2="580" y2="160"/><line x1="720" y1="90" x2="700" y2="210"/>
  <line x1="200" y1="420" x2="180" y2="540"/><line x1="700" y1="480" x2="680" y2="600"/>
 </g>

 <rect width="800" height="800" fill="url(#dvig)"/>
</svg>
