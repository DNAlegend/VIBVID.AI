<!-- VIBVID sign-in code email.
     Paste into Supabase → Authentication → Email Templates → "Magic Link"
     AND "Confirm signup" (OTP sign-ups for brand-new emails use the latter).
     Subject line suggestion:  Your VIBVID sign-in code: {{ .Token }}
     Table-based + inline styles for email-client compatibility; no images,
     so nothing to host and nothing for clients to block. -->
<table role="presentation" width="100%" cellpadding="0" cellspacing="0" style="background:#f5f5f7;padding:32px 12px;">
  <tr>
    <td align="center">
      <table role="presentation" width="440" cellpadding="0" cellspacing="0" style="max-width:440px;width:100%;background:#ffffff;border:1px solid #e7e7ec;border-radius:16px;padding:36px 32px;font-family:-apple-system,'Segoe UI',Roboto,Helvetica,Arial,sans-serif;">
        <!-- wordmark -->
        <tr>
          <td align="center" style="padding-bottom:24px;">
            <span style="font-size:20px;font-weight:800;letter-spacing:-0.5px;color:#101014;">VIB</span><span style="font-size:20px;font-weight:800;letter-spacing:-0.5px;color:#ffffff;background:#ec1320;border-radius:6px;padding:2px 7px;">VID&#9654;</span><span style="font-size:20px;font-weight:800;color:#8a8b96;">.AI</span>
          </td>
        </tr>
        <tr>
          <td align="center" style="font-size:17px;font-weight:700;color:#101014;padding-bottom:6px;">
            Your sign-in code
          </td>
        </tr>
        <tr>
          <td align="center" style="font-size:14px;line-height:1.55;color:#5a5b66;padding-bottom:22px;">
            Type this code in the VIBVID app to sign in.
          </td>
        </tr>
        <!-- the code -->
        <tr>
          <td align="center" style="padding-bottom:22px;">
            <div style="display:inline-block;background:#fdeaeb;border:1px solid #f5c2c6;border-radius:12px;padding:14px 26px;font-family:ui-monospace,'SF Mono',Menlo,Consolas,monospace;font-size:30px;font-weight:700;letter-spacing:6px;color:#101014;">{{ .Token }}</div>
          </td>
        </tr>
        <tr>
          <td align="center" style="font-size:13px;line-height:1.6;color:#8a8b96;padding-bottom:26px;">
            The code expires in 1 hour.<br>
            Prefer one tap? <a href="{{ .ConfirmationURL }}" style="color:#ec1320;font-weight:600;text-decoration:none;">Sign in with this link</a> instead.
          </td>
        </tr>
        <tr>
          <td style="border-top:1px solid #e7e7ec;padding-top:18px;font-size:12px;line-height:1.6;color:#8a8b96;" align="center">
            Didn&rsquo;t request this? You can safely ignore this email —<br>
            no one can sign in without the code.
          </td>
        </tr>
      </table>
      <table role="presentation" width="440" cellpadding="0" cellspacing="0" style="max-width:440px;width:100%;">
        <tr>
          <td align="center" style="font-family:-apple-system,'Segoe UI',Roboto,Helvetica,Arial,sans-serif;font-size:11px;color:#a8a9b3;padding-top:16px;">
            &copy; 2026 VIBVID.AI&trade; &middot; <a href="https://www.vibvid.ai" style="color:#a8a9b3;">vibvid.ai</a>
          </td>
        </tr>
      </table>
    </td>
  </tr>
</table>
